name: Sync, Translate and Deploy

on:
  schedule:
    - cron: '0 0 * * *' # daily at midnight instead of every 30 minutes
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # on button click

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: tgymnich/fork-sync@v2.0
        with:
          token: ${{ secrets.FORK_SYNC_TOKEN }}
          base: main
          head: main

  translate:
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4

      - name: Clone translation tool (if needed)
        run: |
          cd ~
          git clone ${{vars.AITDOCS_REPO}}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          working-directory: ~/aitdocs

      - name: Setup environment variables
        run: |
          cd ~/aitdocs
          echo "ALI_BASE_URL=${{vars.ALI_LLM_BASE_URL}}" > .env
          echo "ALI_MODEL_NAME=${{vars.ALI_LLM_MODEL_NAME}}" >> .env
          echo "ALI_API_KEY=${{secrets.ALI_LLM_API_KEY}}" >> .env

      - name: Install dependencies
        run: |
          cd ~/aitdocs
          uv sync --frozen

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run translation
        run: |
          # uv run main.py -d ${{vars.DOCS_DIR}} --incremental --auto-commit --auto-push
          # 定义变量=>DIR_PATH = pwd + vars.DOCS_DIR
          DIR_PATH=$(pwd)/${{ vars.DOCS_DIR }}
          echo "DIR_PATH: ${DIR_PATH}"
          cd ~/aitdocs
          echo "DIR_PATH: ${DIR_PATH}"
          # uv run main.py -d $DIR_PATH --incremental --auto-commit --auto-push